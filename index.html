<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9 Works Theatrical | Manila's Premiere Theatre Company</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --nine-works-blue: #0054a6; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1d1d1f; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        #loader { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        .loader-logo { width: 240px; margin-bottom: 2rem; animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.7; } }
        .progress-bar { width: 0%; height: 4px; background: var(--nine-works-blue); transition: width 0.4s ease; }

        .poster-frame { 
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.12); border-radius: 2rem; overflow: hidden; 
            background: #f8fafc; aspect-ratio: 2/3; margin: 0 auto;
        }
        .poster-frame img { width: 100%; height: 100%; object-fit: contain; }
        
        .hero-poster { max-width: 480px; width: 100%; }
        .coming-poster { max-width: 380px; width: 100%; }
        .past-poster { max-width: 280px; width: 100%; }

        /* THE DESCRIPTION ANIMATION */
        .show-description {
            max-width: 700px; margin: 2rem auto; font-size: 1.15rem; line-height: 1.8;
            color: #4b5563; font-weight: 400; opacity: 0; transform: translateY(20px);
            transition: all 1s cubic-bezier(0.165, 0.84, 0.44, 1) 0.6s;
        }
        .aos-animate .show-description { opacity: 1; transform: translateY(0); }

        .team-circle { width: 8rem; height: 8rem; margin: 0 auto 1.5rem; border-radius: 9999px; overflow: hidden; background: #f1f5f9; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        @media (min-width: 768px) { .team-circle { width: 13rem; height: 13rem; } }
        .team-circle img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: all 0.5s ease; }
        .team-circle:hover img { filter: grayscale(0%); }

        #sticky-header { transition: transform 0.4s ease; transform: translateY(-100%); background: white; border-bottom: 1px solid #eee; z-index: 100; }
        #sticky-header.visible { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://drive.google.com/thumbnail?id=1P6GlMPvfrKxeZdelIfjHhY378yYHA9bz&sz=w600" class="loader-logo">
        <div style="width:220px; height:4px; background:#f1f5f9; border-radius:10px; overflow:hidden;">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <header id="sticky-header" class="fixed top-0 left-0 w-full p-4 pointer-events-none">
        <div class="max-w-7xl mx-auto flex justify-center">
            <img src="https://drive.google.com/thumbnail?id=1P6GlMPvfrKxeZdelIfjHhY378yYHA9bz&sz=w200" class="w-16 pointer-events-auto cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        </div>
    </header>

    <main id="main-content" class="opacity-0 transition-opacity duration-700">
        
        <section id="now-playing-section" class="py-32 px-6 hidden">
            <div class="max-w-7xl mx-auto text-center">
                <div data-aos="fade-down" class="mb-10"><span class="px-8 py-2 rounded-full bg-blue-50 text-[var(--nine-works-blue)] text-sm font-black uppercase border border-blue-100 tracking-widest">Now Playing</span></div>
                <div id="hero-content"></div>
            </div>
        </section>

        <section id="coming-soon-section" class="py-24 px-6 max-w-7xl mx-auto border-t border-zinc-100 hidden">
            <h2 class="text-center text-4xl font-extrabold text-[var(--nine-works-blue)] mb-16">Coming Soon</h2>
            <div id="coming-soon-grid" class="flex flex-wrap justify-center gap-x-12 gap-y-16"></div>
        </section>

        <section class="py-24 px-6 max-w-7xl mx-auto border-t border-zinc-100">
            <h2 class="text-center text-4xl font-extrabold text-[var(--nine-works-blue)] mb-16">Past Shows</h2>
            <div id="archive-grid" class="grid grid-cols-2 md:grid-cols-4 gap-x-8 gap-y-16"></div>
        </section>

        <section class="py-32 bg-zinc-50 px-6 mb-40">
            <h2 class="text-center text-4xl font-extrabold text-[var(--nine-works-blue)] mb-20">The Team</h2>
            <div id="team-grid" class="flex flex-wrap justify-center gap-x-12 gap-y-16 max-w-7xl mx-auto"></div>
        </section>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxqLYJf6NWT3uHYHKNW18qTeC2llRZrxpQv2-MpKGizMGfeFWagzGMD-NAaOU4VdB9j/exec';
        const progressBar = document.getElementById('progress-bar');

        function getVal(obj, keyName) {
            const foundKey = Object.keys(obj || {}).find(k => k.trim().toLowerCase() === keyName.toLowerCase());
            return foundKey ? String(obj[foundKey]).trim() : "";
        }

        async function init() {
            try {
                progressBar.style.width = "30%";
                const response = await fetch(API_URL);
                const data = await response.json();
                progressBar.style.width = "100%";
                
                const shows = data.shows || [];
                const current = shows.filter(s => getVal(s, 'Type').toLowerCase().includes('current'));
                const coming = shows.filter(s => getVal(s, 'Type').toLowerCase().includes('coming'));
                const past = shows.filter(s => getVal(s, 'Type').toLowerCase().includes('past'));

                // 1. HERO SECTION (With Description)
                if (current.length > 0) {
                    document.getElementById('now-playing-section').classList.remove('hidden');
                    document.getElementById('hero-content').innerHTML = current.map(s => {
                        const desc = getVal(s, 'Description');
                        return `
                        <div class="mb-20" data-aos="zoom-in">
                            <div class="poster-frame hero-poster mb-10"><img src="${getVal(s, 'Poster')}" loading="lazy"></div>
                            <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter mb-4 text-zinc-900 leading-tight">${getVal(s, 'Title')}</h1>
                            <p class="text-[var(--nine-works-blue)] text-xl font-bold uppercase tracking-widest mb-6">${getVal(s, 'Date') || getVal(s, 'Year')}</p>
                            ${desc ? `<div class="show-description italic px-6">${desc}</div>` : ''}
                            <div class="flex flex-col sm:flex-row gap-4 justify-center mt-10">
                                <a href="https://ticket2me.net" target="_blank" class="bg-[var(--nine-works-blue)] text-white px-14 py-5 rounded-full font-bold text-xl shadow-2xl hover:scale-105 transition-transform">Buy Tickets</a>
                                <a href="mailto:info@9workstheatrical.com" class="bg-white text-zinc-900 px-14 py-5 rounded-full font-bold text-xl border border-zinc-200">Buy a Show</a>
                            </div>
                        </div>`;
                    }).join('');
                }

                // 2. COMING SOON (Also shows Description if available)
                if (coming.length > 0) {
                    document.getElementById('coming-soon-section').classList.remove('hidden');
                    document.getElementById('coming-soon-grid').innerHTML = coming.map(s => {
                        const desc = getVal(s, 'Description');
                        return `
                        <div class="text-center w-full md:w-[calc(50%-1.5rem)] lg:w-[calc(50%-2rem)] max-w-2xl mx-auto" data-aos="fade-up">
                            <div class="poster-frame coming-poster mb-6"><img src="${getVal(s, 'Poster')}" loading="lazy"></div>
                            <h4 class="font-bold text-3xl leading-tight mb-2">${getVal(s, 'Title')}</h4>
                            <p class="text-[var(--nine-works-blue)] text-sm font-black uppercase tracking-widest mb-4">${getVal(s, 'Date') || getVal(s, 'Year')}</p>
                            ${desc ? `<div class="show-description text-sm leading-relaxed px-4">${desc}</div>` : ''}
                            <div class="flex flex-col sm:flex-row gap-4 justify-center mt-8">
                                <a href="https://ticket2me.net" target="_blank" class="bg-[var(--nine-works-blue)] text-white px-10 py-4 rounded-full font-bold text-lg shadow-xl hover:scale-105 transition-transform">Buy Tickets</a>
                                <a href="mailto:info@9workstheatrical.com" class="bg-white text-zinc-900 px-10 py-4 rounded-full font-bold text-lg border border-zinc-200">Buy a Show</a>
                            </div>
                        </div>`;
                    }).join('');
                }

                // 3. PAST SHOWS
                document.getElementById('archive-grid').innerHTML = past.map(s => `
                    <div class="text-center" data-aos="fade-up">
                        <div class="poster-frame past-poster mb-6"><img src="${getVal(s, 'Poster')}" loading="lazy"></div>
                        <h4 class="font-bold text-lg leading-tight">${getVal(s, 'Title')}</h4>
                        <p class="text-zinc-400 text-xs font-bold uppercase tracking-widest mt-2">${getVal(s, 'Year')}</p>
                    </div>`).join('');

                // 4. TEAM
                document.getElementById('team-grid').innerHTML = (data.team || []).map(p => `
                    <div class="text-center w-[calc(50%-1.5rem)] md:w-[calc(25%-3rem)]" data-aos="fade-up">
                        <div class="team-circle"><img src="${getVal(p, 'Photo')}" loading="lazy"></div>
                        <h4 class="font-bold text-xl leading-tight">${getVal(p, 'Name')}</h4>
                        <p class="text-[var(--nine-works-blue)] text-[10px] font-black uppercase tracking-widest mt-2">${getVal(p, 'Role')}</p>
                    </div>`).join('');

                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('main-content').classList.remove('opacity-0');
                        AOS.init({ once: true, duration: 800 });
                    }, 600);
                }, 400);

            } catch (err) { console.error(err); }
        }
        window.onload = init;
        window.addEventListener('scroll', () => {
            document.getElementById('sticky-header').classList.toggle('visible', window.scrollY > 400);
        });
    </script>
</body>
</html>
