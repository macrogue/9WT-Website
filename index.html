<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9 Works Theatrical | Manila's Premiere Theatre Company</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --nine-works-blue: #0054a6; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1d1d1f; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* LOADER */
        #loader { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        .loader-logo { width: 240px; margin-bottom: 2rem; }
        .progress-container { width: 220px; height: 4px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--nine-works-blue); transition: width 0.4s ease; }

        /* POSTERS */
        .poster-frame { box-shadow: 0 30px 60px -12px rgba(0,0,0,0.12); border-radius: 2rem; overflow: hidden; background: #f8fafc; aspect-ratio: 2/3; margin: 0 auto; }
        .poster-frame img { width: 100%; height: 100%; object-fit: contain; }

        /* DESCRIPTIONS */
        .show-description { 
            max-width: 700px; margin: 2rem auto; font-size: 1.15rem; line-height: 1.8; 
            color: #4b5563; 
        }

        /* THE TEAM - ULTIMATE CENTERING & IPHONE FIX */
        .team-container {
            display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start;
            gap: 4rem 2rem; max-width: 1200px; margin: 0 auto;
        }
        .team-member {
            width: 100%; max-width: 280px; display: flex; flex-direction: column;
            align-items: center; text-align: center;
        }
        @media (min-width: 768px) {
            .team-member { width: calc(25% - 2rem); }
        }
        .team-circle { 
            width: 12rem; height: 12rem; margin-bottom: 1.5rem; border-radius: 50%; 
            overflow: hidden; background: #f8fafc; box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            display: flex; align-items: center; justify-content: center;
        }
        .team-circle img { 
            width: 100%; height: 100%; object-fit: cover; 
            object-position: center 12%; 
            filter: grayscale(100%); transition: 0.6s ease; 
        }
        .team-circle:hover img { filter: grayscale(0%); transform: scale(1.08); }

        /* INVERTED V BACK TO TOP */
        #back-to-top { 
            position: fixed; bottom: 3rem; right: 2.5rem; 
            width: 25px; height: 25px; 
            border-left: 4px solid var(--nine-works-blue);
            border-top: 4px solid var(--nine-works-blue);
            transform: rotate(45deg);
            cursor: pointer; opacity: 0; visibility: hidden; transition: 0.4s; z-index: 90;
        }
        #back-to-top.visible { opacity: 0.6; visibility: visible; }
        #back-to-top:hover { opacity: 1; transform: rotate(45deg) scale(1.15); }

        /* LIQUID GLASS SOCIAL DOCK */
        .glass-social-dock {
            position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 999px;
            padding: 0.8rem 2.2rem; display: flex; gap: 2.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); z-index: 100;
        }
        .glass-social-dock a { color: #1d1d1f; font-size: 1.3rem; opacity: 0.6; transition: 0.3s; }
        .glass-social-dock a:hover { opacity: 1; transform: translateY(-3px); color: var(--nine-works-blue); }

        #sticky-header { transition: 0.4s; transform: translateY(-100%); background: white; border-bottom: 1px solid #eee; z-index: 100; position: fixed; top: 0; width: 100%; padding: 1rem; }
        #sticky-header.visible { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://drive.google.com/thumbnail?id=1P6GlMPvfrKxeZdelIfjHhY378yYHA9bz&sz=w600" class="loader-logo">
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
    </div>

    <header id="sticky-header">
        <div class="max-w-7xl mx-auto flex justify-center">
            <img src="https://drive.google.com/thumbnail?id=1P6GlMPvfrKxeZdelIfjHhY378yYHA9bz&sz=w200" class="w-16 cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        </div>
    </header>

    <main id="main-content" class="opacity-0 transition-opacity duration-700">
        <section id="now-playing-section" class="py-32 px-6 hidden text-center">
            <div data-aos="fade-down" class="mb-10"><span class="px-8 py-2 rounded-full bg-blue-50 text-[var(--nine-works-blue)] text-sm font-black uppercase tracking-widest">Now Playing</span></div>
            <div id="hero-content"></div>
        </section>

        <section id="coming-soon-section" class="py-24 px-6 max-w-7xl mx-auto border-t border-zinc-100 hidden">
            <h2 class="text-center text-4xl font-extrabold text-[var(--nine-works-blue)] mb-16">Coming Soon</h2>
            <div id="coming-soon-grid" class="flex flex-wrap justify-center gap-12"></div>
        </section>

        <section class="py-24 px-6 max-w-7xl mx-auto border-t border-zinc-100">
            <h2 class="text-center text-4xl font-extrabold text-[var(--nine-works-blue)] mb-16">Past Shows</h2>
            <div id="archive-grid" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
        </section>

        <section id="team-section" class="py-32 bg-zinc-50 px-6 hidden">
            <h2 class="text-center text-4xl font-extrabold text-[var(--nine-works-blue)] mb-20">The Team</h2>
            <div id="team-grid" class="team-container"></div>
        </section>
        
        <footer class="py-32 text-center pb-48">
            <p class="text-zinc-400 text-sm font-medium">© 2026 9 Works Theatrical. Manila, Philippines.</p>
        </footer>
    </main>

    <div class="glass-social-dock">
        <a href="https://facebook.com/9workstheatrical" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="https://instagram.com/9workstheatrical" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.threads.net/@9workstheatrical" target="_blank"><i class="fab fa-threads"></i></a>
    </div>

    <div id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxqLYJf6NWT3uHYHKNW18qTeC2llRZrxpQv2-MpKGizMGfeFWagzGMD-NAaOU4VdB9j/exec';
        
        function getVal(obj, keyName) {
            const foundKey = Object.keys(obj || {}).find(k => k.trim().toLowerCase() === keyName.toLowerCase());
            return foundKey ? String(obj[foundKey]).trim() : "";
        }

        async function init() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const shows = data.shows || [];
                const current = shows.filter(s => getVal(s, 'Type').toLowerCase().includes('current'));
                const coming = shows.filter(s => getVal(s, 'Type').toLowerCase().includes('coming'));
                const past = shows.filter(s => getVal(s, 'Type').toLowerCase().includes('past'));

                if (current.length > 0) {
                    document.getElementById('now-playing-section').classList.remove('hidden');
                    document.getElementById('hero-content').innerHTML = current.map(s => `
                        <div class="mb-20" data-aos="zoom-in">
                            <div class="poster-frame max-w-[480px] mb-10"><img src="${getVal(s, 'Poster')}"></div>
                            <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter mb-4">${getVal(s, 'Title')}</h1>
                            <p class="text-[var(--nine-works-blue)] text-xl font-bold uppercase tracking-widest">${getVal(s, 'Date') || getVal(s, 'Year')}</p>
                            <p class="show-description italic px-6 mx-auto">${getVal(s, 'Description')}</p>
                            <div class="mt-10"><a href="https://ticket2me.net" target="_blank" class="bg-[var(--nine-works-blue)] text-white px-14 py-5 rounded-full font-bold text-xl shadow-2xl inline-block hover:scale-105 transition-transform">Buy Tickets</a></div>
                        </div>`).join('');
                }

                if (coming.length > 0) {
                    document.getElementById('coming-soon-section').classList.remove('hidden');
                    document.getElementById('coming-soon-grid').innerHTML = coming.map(s => `
                        <div class="text-center w-full md:w-[calc(50%-2rem)] max-w-2xl" data-aos="fade-up">
                            <div class="poster-frame max-w-[380px] mb-6"><img src="${getVal(s, 'Poster')}"></div>
                            <h4 class="font-bold text-3xl mb-2">${getVal(s, 'Title')}</h4>
                            <p class="text-[var(--nine-works-blue)] text-sm font-black uppercase tracking-widest mb-4">${getVal(s, 'Date') || getVal(s, 'Year')}</p>
                            <p class="show-description text-sm px-4 mx-auto">${getVal(s, 'Description')}</p>
                        </div>`).join('');
                }

                document.getElementById('archive-grid').innerHTML = past.map(s => `
                    <div class="text-center" data-aos="fade-up">
                        <div class="poster-frame max-w-[280px] mb-6"><img src="${getVal(s, 'Poster')}"></div>
                        <h4 class="font-bold text-lg">${getVal(s, 'Title')}</h4>
                        <p class="text-zinc-400 text-xs font-bold uppercase mt-2">${getVal(s, 'Year')}</p>
                    </div>`).join('');

                if (data.team && data.team.length > 0) {
                    document.getElementById('team-section').classList.remove('hidden');
                    document.getElementById('team-grid').innerHTML = data.team.map(p => `
                        <div class="team-member" data-aos="fade-up">
                            <div class="team-circle"><img src="${getVal(p, 'Photo')}"></div>
                            <h4 class="font-bold text-xl leading-tight">${getVal(p, 'Name')}</h4>
                            <p class="text-[var(--nine-works-blue)] text-[11px] font-black uppercase tracking-widest mt-3 leading-relaxed px-4">${getVal(p, 'Role')}</p>
                        </div>`).join('');
                }

                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-content').classList.remove('opacity-0');
                    AOS.init({ once: true, duration: 800 });
                }, 600);

            } catch (err) { 
                console.error(err);
            }
        }
        window.onload = init;
        window.addEventListener('scroll', () => {
            document.getElementById('sticky-header').classList.toggle('visible', window.scrollY > 400);
            document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 600);
        });
    </script>
</body>
</html>
